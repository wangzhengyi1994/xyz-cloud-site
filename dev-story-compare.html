<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设计产品如何去掉 AI 味儿 — 对比演示</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0a;
  font-family: 'Inter', -apple-system, sans-serif;
  overflow: hidden;
  height: 100vh;
}

/* ═══════ TAB BAR ═══════ */
.tab-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: none; align-items: center; justify-content: center;
  gap: 4px;
  height: 56px;
  background: rgba(10, 10, 10, 0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding: 0 24px;
}

.tab-bar .title {
  position: absolute; left: 24px;
  font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.4);
  letter-spacing: 0.5px;
}

.tab-group {
  display: flex;
  background: rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 3px;
}

.tab-btn {
  position: relative;
  padding: 8px 20px;
  font-size: 12px; font-weight: 600; font-family: inherit;
  color: rgba(255,255,255,0.5);
  background: none; border: none; cursor: pointer;
  border-radius: 8px;
  transition: all 0.3s ease;
  display: flex; align-items: center; gap: 8px;
}
.tab-btn:hover { color: rgba(255,255,255,0.8); }

.tab-btn.active {
  color: #fff;
  background: rgba(255,255,255,0.12);
}

.tab-btn .dot {
  width: 8px; height: 8px; border-radius: 50%;
}
.tab-btn.v1 .dot { background: linear-gradient(135deg, #7c3aed, #3b82f6); }
.tab-btn.v2 .dot { background: #4362ff; }
.tab-btn.v3 .dot { background: linear-gradient(135deg, #6B89FF, #e8ee5a); }

.tab-btn .badge {
  font-size: 10px; font-weight: 500; padding: 1px 7px;
  border-radius: 100px; letter-spacing: 0.3px;
}
.tab-btn.v1 .badge { background: rgba(124,58,237,0.2); color: #a78bfa; }
.tab-btn.v2 .badge { background: rgba(67,98,255,0.2); color: #6b89ff; }
.tab-btn.v3 .badge { background: rgba(107,137,255,0.2); color: #6B89FF; }

/* ═══════ IFRAME CONTAINER ═══════ */
.frame-container {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
}

.frame-container iframe {
  width: 100%; height: 100%;
  border: none;
  position: absolute; top: 0; left: 0;
  transition: opacity 0.3s ease;
}

.frame-container iframe.hidden {
  opacity: 0;
  pointer-events: none;
}

/* ═══════ SPLIT MODE (三屏同步) ═══════ */
.frame-container.split-mode iframe {
  position: relative;
  width: 33.333%;
  height: 100%;
  float: left;
  border-right: 1px solid rgba(255,255,255,0.1);
}
.frame-container.split-mode iframe:last-child { border-right: none; }
.frame-container.split-mode iframe.hidden {
  opacity: 1;
  pointer-events: auto;
}

/* 三屏标签 */
.split-labels {
  position: fixed; top: 0; left: 0; right: 0; z-index: 101;
  display: none; height: 28px;
}
.split-labels.show { display: flex; }
.split-label {
  flex: 1; text-align: center;
  font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.6);
  line-height: 28px;
  border-right: 1px solid rgba(255,255,255,0.1);
  background: rgba(10,10,10,0.9);
}
.split-label:last-child { border-right: none; }
.frame-container.split-mode { top: 28px; display: flex; }

/* ═══════ KEYBOARD HINT ═══════ */
.hint {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  z-index: 100;
  font-size: 11px; color: rgba(255,255,255,0.3);
  display: flex; gap: 16px;
}
.hint kbd {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 22px; height: 20px; padding: 0 5px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 4px; font-family: inherit; font-size: 10px; color: rgba(255,255,255,0.5);
  margin: 0 3px;
}
</style>
</head>
<body>

<div class="tab-bar">
  <div class="title">设计产品如何去掉 AI 味儿</div>
  <div class="tab-group">
    <button class="tab-btn v1 active" data-tab="v1">
      <span class="dot"></span>
      V1 · AI 生成风格
      <span class="badge">Before</span>
    </button>
    <button class="tab-btn v2" data-tab="v2">
      <span class="dot"></span>
      V2 · 设计风格约束
      <span class="badge">After</span>
    </button>
    <button class="tab-btn v3" data-tab="v3">
      <span class="dot"></span>
      V3 · 极致设计
      <span class="badge">Max</span>
    </button>
    <span style="width:1px;height:24px;background:rgba(255,255,255,0.12);margin:0 8px;"></span>
    <button class="tab-btn all" data-tab="all">
      <span class="dot" style="background:linear-gradient(135deg,#7c3aed,#4362ff,#00BFA7);"></span>
      三屏同步
    </button>
  </div>
</div>

<div class="frame-container" id="frameContainer">
  <iframe src="dev-story-v1.html" id="frameV1"></iframe>
  <iframe src="dev-story.html" id="frameV2" class="hidden"></iframe>
  <iframe src="dev-story-v3.html" id="frameV3" class="hidden"></iframe>
</div>

<div class="split-labels" id="splitLabels">
  <div class="split-label">V1 · AI 生成风格</div>
  <div class="split-label">V2 · 设计风格约束</div>
  <div class="split-label">V3 · 极致设计</div>
</div>

<div class="hint">
  <span>按 <kbd>1</kbd> V1</span>
  <span>按 <kbd>2</kbd> V2</span>
  <span>按 <kbd>3</kbd> V3</span>
  <span>按 <kbd>A</kbd> 三屏同步</span>
</div>

<script>
(function() {
  const tabs = document.querySelectorAll('.tab-btn');
  const frames = {
    v1: document.getElementById('frameV1'),
    v2: document.getElementById('frameV2'),
    v3: document.getElementById('frameV3'),
  };

  const container = document.getElementById('frameContainer');
  const splitLabels = document.getElementById('splitLabels');
  let splitMode = false;
  let syncing = false;

  function switchTab(tab) {
    if (tab === 'all') {
      splitMode = true;
      container.classList.add('split-mode');
      splitLabels.classList.add('show');
      tabs.forEach(t => t.classList.remove('active'));
      document.querySelector('.tab-btn.all').classList.add('active');
      Object.values(frames).forEach(f => f.classList.remove('hidden'));
      setupSyncScroll();
      return;
    }
    splitMode = false;
    container.classList.remove('split-mode');
    splitLabels.classList.remove('show');
    // 恢复 iframe 自身滚动
    Object.values(frames).forEach(f => {
      try { f.contentDocument.documentElement.style.overflow = ''; } catch(e) {}
    });
    tabs.forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab-btn.${tab}`).classList.add('active');
    Object.entries(frames).forEach(([key, frame]) => {
      if (key === tab) frame.classList.remove('hidden');
      else frame.classList.add('hidden');
    });
  }

  // 同步滚动：统一 wheel 驱动，用 scrollTop 百分比同步
  let scrollPct = 0;
  let syncBound = false;

  function syncAllFrames() {
    const allFrames = Object.values(frames);
    allFrames.forEach(frame => {
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        const maxScroll = doc.documentElement.scrollHeight - doc.documentElement.clientHeight;
        doc.documentElement.scrollTop = scrollPct * maxScroll;
      } catch(e) {}
    });
  }

  function handleWheel(e) {
    if (!splitMode) return;
    e.preventDefault();
    // 用 V1 的总高度作为基准计算百分比增量
    try {
      const doc = frames.v1.contentDocument || frames.v1.contentWindow.document;
      const maxScroll = doc.documentElement.scrollHeight - doc.documentElement.clientHeight;
      if (maxScroll > 0) {
        scrollPct += e.deltaY / maxScroll;
        scrollPct = Math.max(0, Math.min(1, scrollPct));
      }
    } catch(e2) {}
    syncAllFrames();
  }

  function setupSyncScroll() {
    if (syncBound) return;
    syncBound = true;
    const allFrames = Object.values(frames);

    // 外层 wheel
    document.addEventListener('wheel', handleWheel, { passive: false });

    // iframe 内 wheel 转发
    allFrames.forEach(frame => {
      try {
        frame.contentWindow.addEventListener('wheel', handleWheel, { passive: false });
      } catch(e) {}
    });
  }

  // 键盘快捷键处理
  function handleKey(e) {
    if (e.key === '1') switchTab('v1');
    if (e.key === '2') switchTab('v2');
    if (e.key === '3') switchTab('v3');
    if (e.key === 'a' || e.key === 'A') switchTab('all');
  }

  // iframe 加载完成后绑定
  let loaded = 0;
  Object.values(frames).forEach(frame => {
    frame.addEventListener('load', () => {
      loaded++;
      if (loaded >= 3) setupSyncScroll();
      // 在 iframe 内也监听键盘，防止焦点在 iframe 时快捷键失效
      try { frame.contentWindow.addEventListener('keydown', handleKey); } catch(e) {}
    });
  });

  tabs.forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  document.addEventListener('keydown', handleKey);
})();
</script>
</body>
</html>
